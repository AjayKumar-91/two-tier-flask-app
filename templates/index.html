<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Flask Chat 🚀</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* Theme */
body {
    background: #121212;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    width: 400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 20px;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* Toggle Button */
.toggle {
    cursor: pointer;
    background: #ff9800;
    border: none;
    padding: 5px 10px;
    border-radius: 6px;
}

/* Messages */
.messages {
    height: 300px;
    overflow-y: auto;
    margin: 15px 0;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
}

/* Chat Bubble */
.message {
    padding: 10px;
    margin: 5px 0;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #ff9800;
    align-self: flex-end;
}

.bot {
    background: #333;
}

/* Input */
input {
    width: 75%;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #ff9800;
    cursor: pointer;
}

/* Loader */
.loader {
    display: none;
    text-align: center;
}

/* Dark Mode */
.light-mode {
    background: #f5f5f5;
    color: black;
}

.light-mode .container {
    background: white;
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h3>🚀 Flask Chat</h3>
        <button class="toggle">🌙</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="loader" id="loader">Typing...</div>

    <form id="form">
        <input type="text" id="input" placeholder="Type message..." required>
        <button>Send</button>
    </form>

    <button onclick="clearChat()">🗑 Clear</button>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

// Load saved messages
let messagesDiv = $("#messages");

function loadMessages() {
    let data = JSON.parse(localStorage.getItem("chat")) || [];
    data.forEach(m => addMessage(m.text, m.type));
}

function saveMessage(text, type) {
    let data = JSON.parse(localStorage.getItem("chat")) || [];
    data.push({text, type});
    localStorage.setItem("chat", JSON.stringify(data));
}

// Add message
function addMessage(text, type) {
    let msg = `<div class="message ${type}">
        ${text}
        <div style="font-size:10px">${new Date().toLocaleTimeString()}</div>
    </div>`;
    messagesDiv.append(msg);
    messagesDiv.scrollTop(messagesDiv[0].scrollHeight);
}

// Clear chat
function clearChat() {
    localStorage.removeItem("chat");
    messagesDiv.html("");
}

// Dark mode toggle
$(".toggle").click(() => {
    $("body").toggleClass("light-mode");
});

// Submit form
$("#form").submit(function(e) {
    e.preventDefault();

    let input = $("#input");
    let text = input.val().trim();
    if (!text) return;

    addMessage(text, "user");
    saveMessage(text, "user");

    input.val("");
    $("#loader").show();

    $.ajax({
        url: "/submit",
        method: "POST",
        data: { new_message: text },

        success: function(res) {
            $("#loader").hide();

            let reply = res.message || "No response";
            addMessage(reply, "bot");
            saveMessage(reply, "bot");
        },

        error: function() {
            $("#loader").hide();
            alert("Server error!");
        }
    });
});

// Enter key support
$("#input").keypress(function(e) {
    if (e.which == 13) {
        $("#form").submit();
    }
});

// Init
loadMessages();

</script>

</body>
</html>
